<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Movie Reviews</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <header>
    <h1>🎬 Movie Reviews</h1>
    <p>A simple list of movies and their reviews.</p>
  </header>

  <main>
    <section id="add-movie">
      <h2 id="form-title">Add a Movie</h2>
      <form id="movie-form">
        <input type="text" id="title" placeholder="Title" required />
        <input type="text" id="director" placeholder="Director" required />
        <input type="number" id="year" placeholder="Year" />
        <input type="number" step="0.1" id="rating" placeholder="Rating (0-10)" />
        <textarea id="review" placeholder="Your review..."></textarea>
        <div class="form-buttons">
          <button type="submit" id="submit-btn">Add Movie</button>
          <button type="button" id="cancel-btn" class="hidden">Cancel</button>
        </div>
        <p id="form-message"></p>
      </form>
    </section>

    <section id="movie-list">
      <h2>All Movies</h2>
      <div id="movies"></div>
    </section>
  </main>

  <script src="/script.js"></script>
</body>
</html>
